    - main [ref=e267]:
      - generic [ref=e268]:
        - heading "Submission Checklist" [level=1] [ref=e269]
        - paragraph [ref=e270]:
          - text: Use this checklist before submitting your game for approval.
          - strong [ref=e271]: Incomplete submissions cause delays
          - text: — games that do not meet all requirements will be held until the issues are resolved, which may push your go-live date back significantly.
        - blockquote [ref=e272]:
          - paragraph [ref=e273]:
            - strong [ref=e274]: "Important:"
            - text: The review queue is shared across all teams. Submissions that fail basic checks take reviewer time away from other games and may result in your request being deprioritised. Ensuring everything is in order before you submit is the single most effective way to get your game live quickly.
        - separator [ref=e275]
        - heading "Approval Requirements" [level=2] [ref=e276]
        - paragraph [ref=e277]: The checklist below reflects the exact criteria your game will be reviewed against. Requirements may vary based on your team’s trust level.
        - generic [ref=e278]:
          - paragraph [ref=e279]: Login required
          - paragraph [ref=e280]:
            - text: You must be logged in to view the approval guidelines.
            - link "Log in →" [ref=e281] [cursor=pointer]:
              - /url: /auth/login
        - separator [ref=e282]
        - heading "What Happens After Submission" [level=2] [ref=e283]
        - paragraph [ref=e284]:
          - text: Once you submit, three independent reviewers will be assigned to your game. Each reviewer rates your game from
          - strong [ref=e285]: 0 to 3 stars
          - text: across design, gameplay, and math compliance. Ratings remain hidden until all three are submitted.
        - list [ref=e286]:
          - listitem [ref=e287]:
            - strong [ref=e288]: Average ≥ 1 star
            - text: → Game is approved for production.
          - listitem [ref=e289]:
            - strong [ref=e290]: Average < 1 star
            - text: → Game is rejected. Reviewers may provide feedback and you may resubmit after addressing it.
        - paragraph [ref=e291]: The review process can be as quick as a couple of hours, however submitting an incomplete or non-compliant game blows out that timeline and can take weeks.